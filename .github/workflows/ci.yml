name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save macOS runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Select latest Xcode 26
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -n 1)"

      # Fast, cheap check first: a style/lint failure costs seconds, not build minutes.
      - name: Format & lint (swift-format)
        run: swift format lint --strict --recursive Clowder ClowderKit/Sources ClowderKit/Tests ClowderHelper

      - name: Run unit tests
        run: swift test --package-path ClowderKit

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Build app
        run: |
          xcodegen generate
          xcodebuild -project Clowder.xcodeproj -scheme Clowder \
            -configuration Debug build CODE_SIGNING_ALLOWED=NO
