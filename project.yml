name: Clowder
options:
  bundleIdPrefix: dev.clowder
  deploymentTarget:
    macOS: "26.0"
packages:
  ClowderKit:
    path: ClowderKit
targets:
  Clowder:
    type: application
    platform: macOS
    sources: [Clowder]
    dependencies:
      - package: ClowderKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.clowder.Clowder
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_LSUIElement: true
        INFOPLIST_KEY_NSHumanReadableCopyright: "GPL-3.0"
